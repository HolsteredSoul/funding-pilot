# ═══════════════════════════════════════════════════════════════════
# AU-Funding-Arb v1.0 — Docker Compose
# ═══════════════════════════════════════════════════════════════════

services:
  funding-arb:
    build: .
    container_name: funding-arb
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - "${ARB_DASHBOARD_PORT:-8080}:8080"
    stop_signal: SIGTERM
    stop_grace_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
